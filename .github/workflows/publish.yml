name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Update npm
        run: npm install -g npm@11

      - name: Print npm version
        run: npm --version

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version)")"
          if [ "${TAG_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Expected tag v${PACKAGE_VERSION}, got ${TAG_NAME}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Publish to npm
        run: npm publish
